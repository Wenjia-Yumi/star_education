<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textbook Library | STAR DIGITAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* === Variables & Base Styles === */
    :root {
      --bg-page: #F8F4EC;
      --text-main: #1A1A1A;
      --text-muted: #64748B;
      --accent-gold: #C9A961;
      --border-subtle: #E5E0D5;
      
      --color-xbe: #0E3A3A;
      --color-dml: #5C1F2B;
      --color-bda: #1B2A4E;
      --color-fnd: #2A2A2A;

      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Lora', serif;
      --font-display: 'Manrope', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-page);
      color: var(--text-main);
      line-height: 1.5;
      background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.04"/></svg>');
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* === Header === */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 48px;
    }

    .header-left .title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .header-left .breadcrumb {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .header-left .breadcrumb span {
      margin: 0 4px;
    }

    .header-right .wordmark {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text-main);
    }

    /* === Hero Search Section === */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 64px;
    }

    .search-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin-bottom: 24px;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 18px 24px 18px 52px;
      font-size: 1.125rem;
      font-family: var(--font-sans);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      background: #FFFFFF;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 4px rgba(201, 169, 97, 0.15), 0 4px 20px rgba(0, 0, 0, 0.04);
    }

    .search-input::placeholder {
      color: #94A3B8;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .filters-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .filter-chip {
      padding: 8px 16px;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      background: #FFFFFF;
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-chip:hover {
      background: #F1F5F9;
      color: var(--text-main);
    }

    .filter-chip.active {
      background: var(--accent-gold);
      color: #FFFFFF;
      border-color: var(--accent-gold);
    }

    .results-meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .sort-select {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--text-main);
      border: none;
      background: transparent;
      outline: none;
      cursor: pointer;
      font-weight: 500;
    }

    /* === Grid & Cards === */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 32px;
      margin-bottom: 80px;
    }

    .card {
      background: #FFFFFF;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .card:focus-visible {
      outline: 3px solid var(--accent-gold);
      outline-offset: 2px;
    }

    /* === CSS Book Cover === */
    .cover-wrapper {
      position: relative;
      width: 100%;
      padding-top: 133.33%; /* 3:4 aspect ratio */
      overflow: hidden;
      background: #EEE;
    }

    .cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10% 8% 6% 12%; /* Extra left padding for spine */
      color: #FFFFFF;
      transition: transform 0.4s ease;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.05) 100%),
        url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.1"/></svg>');
    }

    .card:hover .cover {
      transform: scale(1.03);
    }

    .spine-shadow {
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 100%);
      border-right: 1px solid rgba(255,255,255,0.1);
      z-index: 2;
    }
    
    .cover-accent {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 1.5rem;
      opacity: 0.8;
    }

    .cover-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      line-height: 1.25;
      font-weight: 700;
      margin-top: 20px;
      margin-bottom: 12px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .cover-divider {
      height: 2px;
      width: 40px;
      background-color: var(--accent-gold);
      margin-bottom: 12px;
    }

    .cover-subtitle {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .cover-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .cover-logo {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .cover-code {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0.6;
    }

    /* === Card Info === */
    .card-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-tag {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .workbook-link {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px dashed var(--border-subtle);
      font-size: 0.8125rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94A3B8;
      font-weight: 500;
      transition: color 0.2s;
    }
    .workbook-link.active {
      color: var(--text-main);
      cursor: pointer;
    }
    .workbook-link.active:hover {
      color: var(--accent-gold);
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #CBD5E1;
    }
    .workbook-link.active .status-dot {
      background-color: #10B981;
      box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
    }

    .card-desc {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-main);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10;
      margin: 0;
      border-top: none;
    }

    .card:hover .card-desc {
      opacity: 1;
    }

    /* === Empty State === */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      background: #FFFFFF;
      border-radius: 12px;
      border: 1px dashed var(--border-subtle);
      display: none;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .empty-state p {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .clear-btn {
      padding: 10px 20px;
      background: var(--text-main);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #475569;
    }

    /* === Footer === */
    .footer {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: auto;
    }

    /* === Highlight Animation === */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(201, 169, 97, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(201, 169, 97, 0); }
      100% { box-shadow: 0 0 0 0 rgba(201, 169, 97, 0); }
    }
    .highlight-active {
      animation: pulse-ring 0.6s cubic-bezier(0.215, 0.61, 0.355, 1);
      border-color: var(--accent-gold);
    }

    /* === Card Entry Animation === */
    .card {
      opacity: 0;
      transform: translateY(20px);
    }
    .card.animate-in {
      animation: cardEntry 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes cardEntry {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === Responsive === */
    @media (max-width: 640px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .card-title {
        font-size: 0.875rem;
      }
      .cover-title {
        font-size: 1rem;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .header-right {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="header-left">
        <h1 class="title">STAR DIGITAL × Industry College</h1>
        <div class="breadcrumb">
          Home <span>›</span> Curriculum <span>›</span> Textbooks
        </div>
      </div>
      <div class="header-right">
        <div class="wordmark">STAR DIGITAL</div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="search-container">
          <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <label for="search-input" class="visually-hidden">Search textbooks</label>
          <input type="text" id="search-input" class="search-input" placeholder="Search by title, course, major, or keyword…" autocomplete="off">
        </div>

        <div class="filters-row" id="filter-container">
          <button class="filter-chip active" data-major="All">All</button>
          <button class="filter-chip" data-major="Cross-Border E-Commerce">Cross-Border E-Commerce</button>
          <button class="filter-chip" data-major="Digital Marketing & Livestream">Digital Marketing & Livestream</button>
          <button class="filter-chip" data-major="Business Data Analytics">Business Data Analytics</button>
          <button class="filter-chip" data-major="Foundation (shared)">Foundation (shared)</button>
        </div>

        <div class="results-meta">
          <span id="result-count">Showing 18 of 18 textbooks</span>
          <div>
            <label for="sort-select" class="visually-hidden">Sort results</label>
            <select id="sort-select" class="sort-select">
              <option value="newest">Sort: Newest</option>
              <option value="az">Sort: A–Z</option>
              <option value="code">Sort: Course Code</option>
            </select>
          </div>
        </div>
      </section>

      <div class="grid" id="textbook-grid">
        <!-- Cards injected via JS -->
      </div>

      <div class="empty-state" id="empty-state">
        <h3>No textbooks found</h3>
        <p>No textbooks match your search. Try a different keyword or clear filters.</p>
        <button class="clear-btn" onclick="clearFilters()">Clear all filters</button>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 STAR DIGITAL SOLUTION. Educational Resources.</p>
    </footer>
  </div>

  <script>
    // === Data ===
    const TEXTBOOKS = [
      { id: "FND-101", title: "Introduction to Cross-Border E-Commerce", subtitle: "Workbook Edition", courseCode: "FND-101", major: "Foundation (shared)", description: "A comprehensive overview of the global digital marketplace for beginners.", glyph: "🌐", pages: 120, edition: "First Edition, 2026" },
      { id: "FND-102", title: "Business English Communication", subtitle: "Workbook Edition", courseCode: "FND-102", major: "Foundation (shared)", description: "Master essential English terminology and communication strategies for international trade.", glyph: "✉", pages: 150, edition: "First Edition, 2026" },
      { id: "FND-103", title: "International Trade Practice", subtitle: "Workbook Edition", courseCode: "FND-103", major: "Foundation (shared)", description: "Learn the core regulations, incoterms, and documentation required for global shipping.", glyph: "⚓", pages: 180, edition: "First Edition, 2026" },
      { id: "FND-104", title: "Digital Tools & Office Automation", subtitle: "Workbook Edition", courseCode: "FND-104", major: "Foundation (shared)", description: "Boost productivity using modern software, cloud collaboration, and automation tools.", glyph: "⌨", pages: 110, edition: "First Edition, 2026" },
      { id: "FND-105", title: "Consumer Psychology Fundamentals", subtitle: "Workbook Edition", courseCode: "FND-105", major: "Foundation (shared)", description: "Analyze the behavioral drivers behind online purchasing decisions across different cultures.", glyph: "🧭", pages: 140, edition: "First Edition, 2026" },
      { id: "FND-106", title: "Cross-Cultural Business Etiquette", subtitle: "Workbook Edition", courseCode: "FND-106", major: "Foundation (shared)", description: "Navigate cultural differences effectively to build strong international business relationships.", glyph: "🌏", pages: 130, edition: "First Edition, 2026" },
      { id: "XBE-201", title: "Amazon & Shopee Platform Operations", subtitle: "Workbook Edition", courseCode: "XBE-201", major: "Cross-Border E-Commerce", description: "Step-by-step strategies for setting up and scaling storefronts on major e-commerce platforms.", glyph: "📦", pages: 200, edition: "First Edition, 2026" },
      { id: "XBE-202", title: "Cross-Border Logistics & Customs", subtitle: "Workbook Edition", courseCode: "XBE-202", major: "Cross-Border E-Commerce", description: "Manage complex international supply chains and navigate customs clearance smoothly.", glyph: "🚢", pages: 160, edition: "First Edition, 2026" },
      { id: "XBE-203", title: "Overseas Warehouse Management", subtitle: "Workbook Edition", courseCode: "XBE-203", major: "Cross-Border E-Commerce", description: "Optimize inventory distribution and order fulfillment using localized warehouse networks.", glyph: "🏭", pages: 140, edition: "First Edition, 2026" },
      { id: "XBE-204", title: "International Payment & Risk Control", subtitle: "Workbook Edition", courseCode: "XBE-204", major: "Cross-Border E-Commerce", description: "Secure global transactions, handle currency exchange, and mitigate financial fraud.", glyph: "💳", pages: 150, edition: "First Edition, 2026" },
      { id: "SVC-201", title: "Short-Video Content Production", subtitle: "Workbook Edition", courseCode: "SVC-201", major: "Digital Marketing & Livestream", description: "Create viral short-form videos that capture attention and drive product sales.", glyph: "🎬", pages: 130, edition: "First Edition, 2026", hasWorkbook: true },
      { id: "DML-202", title: "Livestream Selling Operations", subtitle: "Workbook Edition", courseCode: "DML-202", major: "Digital Marketing & Livestream", description: "Plan, execute, and optimize live commerce events for maximum audience engagement.", glyph: "📺", pages: 170, edition: "First Edition, 2026" },
      { id: "DML-203", title: "Social Media Traffic Acquisition", subtitle: "Workbook Edition", courseCode: "DML-203", major: "Digital Marketing & Livestream", description: "Leverage organic and paid social media strategies to funnel high-converting traffic.", glyph: "📈", pages: 160, edition: "First Edition, 2026" },
      { id: "DML-204", title: "Influencer & KOL Collaboration", subtitle: "Workbook Edition", courseCode: "DML-204", major: "Digital Marketing & Livestream", description: "Identify, negotiate with, and manage Key Opinion Leaders for impactful brand campaigns.", glyph: "🤝", pages: 140, edition: "First Edition, 2026" },
      { id: "BDA-201", title: "E-Commerce Data Analytics", subtitle: "Workbook Edition", courseCode: "BDA-201", major: "Business Data Analytics", description: "Transform raw platform data into actionable insights to improve store performance.", glyph: "📊", pages: 190, edition: "First Edition, 2026" },
      { id: "BDA-202", title: "BI Tools & Dashboarding", subtitle: "Workbook Edition", courseCode: "BDA-202", major: "Business Data Analytics", description: "Build automated, visually compelling dashboards using modern Business Intelligence software.", glyph: "🗂", pages: 180, edition: "First Edition, 2026" },
      { id: "BDA-203", title: "Consumer Insight & A/B Testing", subtitle: "Workbook Edition", courseCode: "BDA-203", major: "Business Data Analytics", description: "Design rigorous experiments to understand customer preferences and optimize conversions.", glyph: "🧪", pages: 150, edition: "First Edition, 2026" },
      { id: "BDA-204", title: "Sales Forecasting & Inventory Optimization", subtitle: "Workbook Edition", courseCode: "BDA-204", major: "Business Data Analytics", description: "Apply statistical models to predict demand and minimize stockouts or overstock situations.", glyph: "📐", pages: 170, edition: "First Edition, 2026" }
    ];

    const MAJOR_COLORS = {
      "Cross-Border E-Commerce": "var(--color-xbe)",
      "Digital Marketing & Livestream": "var(--color-dml)",
      "Business Data Analytics": "var(--color-bda)",
      "Foundation (shared)": "var(--color-fnd)"
    };

    // === State ===
    let currentSearch = "";
    let currentMajor = "All";
    let currentSort = "newest";

    // === DOM Elements ===
    const gridEl = document.getElementById("textbook-grid");
    const emptyStateEl = document.getElementById("empty-state");
    const countEl = document.getElementById("result-count");
    const searchInput = document.getElementById("search-input");
    const filterChips = document.querySelectorAll(".filter-chip");
    const sortSelect = document.getElementById("sort-select");

    // === Render ===
    function renderGrid(books) {
      gridEl.innerHTML = "";
      
      if (books.length === 0) {
        gridEl.style.display = "none";
        emptyStateEl.style.display = "block";
        countEl.textContent = "Showing 0 textbooks";
        return;
      }

      gridEl.style.display = "grid";
      emptyStateEl.style.display = "none";
      countEl.textContent = `Showing ${books.length} of ${TEXTBOOKS.length} textbooks`;

      books.forEach((book, index) => {
        const coverColor = MAJOR_COLORS[book.major] || "#333";
        
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-id", book.id);
        card.setAttribute("tabindex", "0");
        
        // Add staggered animation delay
        card.style.animationDelay = `${index * 0.05}s`;
        card.classList.add("animate-in");

        card.innerHTML = `
          <div class="cover-wrapper">
            <div class="cover" style="background-color: ${coverColor};">
              <div class="spine-shadow"></div>
              <div class="cover-accent">${book.glyph}</div>
              <div class="cover-title">${book.title}</div>
              <div class="cover-divider"></div>
              <div class="cover-subtitle">${book.subtitle}</div>
              <div class="cover-footer">
                <div class="cover-logo">STAR DIGITAL</div>
                <div class="cover-code">${book.courseCode}</div>
              </div>
            </div>
            <p class="card-desc">${book.description}</p>
          </div>
          <div class="card-info">
            <h3 class="card-title">${book.title}</h3>
            <div class="card-meta">
              <span class="card-tag" style="background-color: ${coverColor};"></span>
              ${book.courseCode} · ${book.major.replace(' (shared)', '')}
            </div>
            <div class="workbook-link ${book.hasWorkbook ? 'active' : ''}" onclick="if(${book.hasWorkbook}) { window.location.href='workbook.html'; event.stopPropagation(); }">
              <span class="status-dot"></span>
              Interactive Workbook
            </div>
          </div>
        `;

        // Click handler
        card.addEventListener("click", () => handleCardClick(card, book.id));
        // Keyboard support
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            handleCardClick(card, book.id);
          }
        });

        gridEl.appendChild(card);
      });
    }

    // === Interactions ===
    function handleCardClick(cardElement, bookId) {
      console.log(`Navigating to textbook: ${bookId}`);
      // Remove highlight from all
      document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight-active'));
      // Add highlight to clicked
      cardElement.classList.add('highlight-active');
      // In a real app, you might window.location.href = `workbook.html?id=${bookId}`;
    }

    // === Search & Filter ===
    function filterAndSort() {
      // Filter
      let filtered = TEXTBOOKS.filter(book => {
        const matchesMajor = currentMajor === "All" || book.major === currentMajor;
        if (!matchesMajor) return false;

        if (!currentSearch) return true;
        const searchLower = currentSearch.toLowerCase();
        return (
          book.title.toLowerCase().includes(searchLower) ||
          book.subtitle.toLowerCase().includes(searchLower) ||
          book.courseCode.toLowerCase().includes(searchLower) ||
          book.major.toLowerCase().includes(searchLower) ||
          book.description.toLowerCase().includes(searchLower)
        );
      });

      // Sort
      if (currentSort === "az") {
        filtered.sort((a, b) => a.title.localeCompare(b.title));
      } else if (currentSort === "code") {
        filtered.sort((a, b) => a.courseCode.localeCompare(b.courseCode));
      } else {
        // "newest" - using original order or could use ID mapping
        // Assuming original array is the intended "Newest / Default" order
        // We do nothing, preserve order of filtered
      }

      renderGrid(filtered);
    }

    function clearFilters() {
      currentSearch = "";
      searchInput.value = "";
      currentMajor = "All";
      filterChips.forEach(c => {
        if (c.dataset.major === "All") c.classList.add("active");
        else c.classList.remove("active");
      });
      filterAndSort();
    }

    // Debounce helper
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // Event Listeners
    searchInput.addEventListener("input", debounce((e) => {
      currentSearch = e.target.value.trim();
      filterAndSort();
    }, 150));

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        searchInput.value = "";
        currentSearch = "";
        filterAndSort();
      }
    });

    filterChips.forEach(chip => {
      chip.addEventListener("click", (e) => {
        filterChips.forEach(c => c.classList.remove("active"));
        e.target.classList.add("active");
        currentMajor = e.target.dataset.major;
        filterAndSort();
      });
    });

    sortSelect.addEventListener("change", (e) => {
      currentSort = e.target.value;
      filterAndSort();
    });

    // Initial Render
    filterAndSort();

  </script>
</body>
